name: Production CI/CD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_ENV_NAME: production

jobs:
  quality-gates:
    name: Quality Gates
    if: ${{ vars.ENABLE_PRODUCTION_CICD == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install and build widget
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  deploy:
    name: Provision and Deploy to Azure
    needs: quality-gates
    if: ${{ vars.ENABLE_PRODUCTION_CICD == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Azure Developer CLI
        run: |
          curl -fsSL https://aka.ms/install-azd.sh | bash
          echo "$HOME/.azd/bin" >> "$GITHUB_PATH"

      - name: Prepare azd environment values
        run: |
          azd env new "$AZURE_ENV_NAME" --no-prompt || azd env select "$AZURE_ENV_NAME"
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION || 'eastus' }}"
          azd env set AIHORDE_API_KEY "${{ secrets.AIHORDE_API_KEY }}"

      - name: Validate Infrastructure Plan
        run: azd provision --preview --no-prompt

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt
