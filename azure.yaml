name: simple-chat-bubble
metadata:
  template: simple-chat-bubble@1.0.0

infra:
  provider: bicep
  path: infra

services:
  web:
    project: backend
    host: appservice
    language: py
    resourceName: ${AZURE_WEBAPP_NAME}
  weather-mcp:
    project: function
    host: function
    language: py
    resourceName: ${AZURE_WEATHER_FUNCTION_APP_NAME}

hooks:
  prepackage:
    posix:
      shell: sh
      run: ./scripts/build_frontend.sh
      continueOnError: false
